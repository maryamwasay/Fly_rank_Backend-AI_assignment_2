version: "3.9"

services:

  db:
    image: postgres:16

    container_name: postgres_db

    restart: always

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .

    container_name: flask_app

    depends_on:
      - db

    env_file:
      - .env

    ports:
      - "5000:5000"

volumes:
  postgres_data: